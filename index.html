<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>JSUK Navigation</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #070b14;
      color: #f8fafc;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      background:
        radial-gradient(circle at top, rgba(30, 64, 175, .28), transparent 38%),
        linear-gradient(180deg, #111827 0%, #070b14 70%);
    }

    button { font: inherit; }

    .app {
      width: min(100%, 620px);
      min-height: 100dvh;
      margin: 0 auto;
      padding: max(22px, env(safe-area-inset-top)) 22px
               max(24px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
    }

    .brand {
      font-size: .78rem;
      font-weight: 800;
      letter-spacing: .18em;
      color: #93c5fd;
      text-transform: uppercase;
      text-align: center;
    }

    h1 {
      margin: 14px 0 4px;
      font-size: clamp(1.7rem, 7vw, 2.8rem);
      line-height: 1.1;
      text-align: center;
    }

    .subtitle {
      margin: 0;
      color: #94a3b8;
      text-align: center;
    }

    .navigator {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 22px 0;
    }

    .nav-content {
      width: 100%;
      text-align: center;
    }

    .arrow-shell {
      width: min(68vw, 330px);
      aspect-ratio: 1;
      margin: 0 auto 22px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(15, 23, 42, .72);
      border: 1px solid rgba(148, 163, 184, .22);
      box-shadow:
        inset 0 0 45px rgba(59, 130, 246, .12),
        0 24px 70px rgba(0, 0, 0, .35);
      position: relative;
    }

    .arrow-shell::before {
      content: "";
      position: absolute;
      inset: 11%;
      border-radius: 50%;
      border: 1px dashed rgba(147, 197, 253, .2);
    }

    .arrow {
      width: 46%;
      height: 58%;
      transform-origin: 50% 54%;
      transform: rotate(0deg);
      transition: transform 160ms linear;
      filter: drop-shadow(0 12px 22px rgba(37, 99, 235, .5));
    }

    .arrow svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .distance {
      font-size: clamp(2.6rem, 13vw, 5rem);
      font-weight: 850;
      line-height: 1;
      letter-spacing: -.05em;
    }

    .distance-label {
      margin-top: 8px;
      color: #94a3b8;
      font-size: 1rem;
    }

    .status-card {
      margin-top: 24px;
      padding: 15px 16px;
      border-radius: 16px;
      background: rgba(15, 23, 42, .72);
      border: 1px solid rgba(148, 163, 184, .18);
      color: #cbd5e1;
      line-height: 1.45;
    }

    .accuracy {
      margin-top: 6px;
      color: #94a3b8;
      font-size: .9rem;
    }

    .controls {
      display: grid;
      gap: 10px;
    }

    .primary {
      width: 100%;
      min-height: 58px;
      border: 0;
      border-radius: 17px;
      padding: 14px 18px;
      background: #2563eb;
      color: white;
      font-weight: 800;
      font-size: 1.08rem;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(37, 99, 235, .28);
    }

    .primary:disabled {
      opacity: .55;
      cursor: wait;
    }

    .hint {
      margin: 2px 5px 0;
      color: #64748b;
      font-size: .82rem;
      text-align: center;
      line-height: 1.4;
    }

    .error {
      color: #fecaca;
      background: rgba(127, 29, 29, .35);
      border-color: rgba(248, 113, 113, .35);
    }

    .arrived {
      color: #bbf7d0;
      background: rgba(20, 83, 45, .35);
      border-color: rgba(74, 222, 128, .35);
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="brand">JSUK Direction Finder</div>
      <h1 id="destinationName">Destination</h1>
      <p class="subtitle">Follow the arrow towards your allocated location</p>
    </header>

    <section class="navigator">
      <div class="nav-content">
        <div class="arrow-shell" aria-label="Direction arrow">
          <div id="arrow" class="arrow">
            <svg viewBox="0 0 100 130" aria-hidden="true">
              <defs>
                <linearGradient id="arrowGradient" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#dbeafe"/>
                  <stop offset="42%" stop-color="#60a5fa"/>
                  <stop offset="100%" stop-color="#2563eb"/>
                </linearGradient>
              </defs>
              <path fill="url(#arrowGradient)"
                    d="M50 2 96 62H69v62H31V62H4L50 2Z"/>
            </svg>
          </div>
        </div>

        <div id="distance" class="distance">—</div>
        <div id="distanceLabel" class="distance-label">Waiting to start</div>

        <div id="statusCard" class="status-card">
          Tap <strong>Start navigation</strong>, then allow location and motion access.
          <div id="accuracy" class="accuracy"></div>
        </div>
      </div>
    </section>

    <footer class="controls">
      <button id="startButton" class="primary" type="button">Start navigation</button>
      <div class="hint">
        Keep the phone upright and away from large metal objects. Location and compass readings remain in your browser.
      </div>
    </footer>
  </main>

<script>
(() => {
  "use strict";

  const params = new URLSearchParams(window.location.search);
  const name = (params.get("name") || "Destination").trim();
  const destinationLat = Number(params.get("lat"));
  const destinationLng = Number(params.get("lng"));

  const destinationName = document.getElementById("destinationName");
  const startButton = document.getElementById("startButton");
  const arrow = document.getElementById("arrow");
  const distanceEl = document.getElementById("distance");
  const distanceLabel = document.getElementById("distanceLabel");
  const statusCard = document.getElementById("statusCard");
  const accuracyEl = document.getElementById("accuracy");

  destinationName.textContent = name;

  const validCoordinates =
    Number.isFinite(destinationLat) &&
    Number.isFinite(destinationLng) &&
    destinationLat >= -90 &&
    destinationLat <= 90 &&
    destinationLng >= -180 &&
    destinationLng <= 180;

  let currentPosition = null;
  let deviceHeading = null;
  let gpsHeading = null;
  let watchId = null;
  let lastArrowRotation = 0;

  function toRadians(value) {
    return value * Math.PI / 180;
  }

  function toDegrees(value) {
    return value * 180 / Math.PI;
  }

  function normaliseDegrees(value) {
    return (value % 360 + 360) % 360;
  }

  function shortestRotation(from, to) {
    return from + ((to - from + 540) % 360 - 180);
  }

  function distanceMetres(lat1, lng1, lat2, lng2) {
    const earthRadius = 6371000;
    const latDelta = toRadians(lat2 - lat1);
    const lngDelta = toRadians(lng2 - lng1);
    const a =
      Math.sin(latDelta / 2) ** 2 +
      Math.cos(toRadians(lat1)) *
      Math.cos(toRadians(lat2)) *
      Math.sin(lngDelta / 2) ** 2;

    return earthRadius * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function bearingDegrees(lat1, lng1, lat2, lng2) {
    const startLat = toRadians(lat1);
    const endLat = toRadians(lat2);
    const deltaLng = toRadians(lng2 - lng1);

    const y = Math.sin(deltaLng) * Math.cos(endLat);
    const x =
      Math.cos(startLat) * Math.sin(endLat) -
      Math.sin(startLat) * Math.cos(endLat) * Math.cos(deltaLng);

    return normaliseDegrees(toDegrees(Math.atan2(y, x)));
  }

  function formatDistance(metres) {
    if (metres < 10) return `${Math.round(metres * 10) / 10} m`;
    if (metres < 1000) return `${Math.round(metres)} m`;
    return `${(metres / 1000).toFixed(metres < 10000 ? 1 : 0)} km`;
  }

  function setStatus(message, type = "") {
    statusCard.className = `status-card ${type}`.trim();
    statusCard.childNodes[0].textContent = message;
  }

  function updateNavigation() {
    if (!currentPosition) return;

    const { latitude, longitude, accuracy } = currentPosition.coords;
    const metres = distanceMetres(latitude, longitude, destinationLat, destinationLng);
    const targetBearing = bearingDegrees(latitude, longitude, destinationLat, destinationLng);

    distanceEl.textContent = formatDistance(metres);
    distanceLabel.textContent = metres <= Math.max(8, accuracy)
      ? "Destination reached"
      : "remaining";

    accuracyEl.textContent = Number.isFinite(accuracy)
      ? `GPS accuracy: approximately ${Math.round(accuracy)} m`
      : "";

    if (metres <= Math.max(8, accuracy)) {
      setStatus(`You have arrived at ${name}.`, "arrived");
    } else {
      setStatus(`Continue towards ${name}.`);
    }

    const heading = deviceHeading ?? gpsHeading;
    if (heading !== null) {
      const desiredRotation = normaliseDegrees(targetBearing - heading);
      lastArrowRotation = shortestRotation(lastArrowRotation, desiredRotation);
      arrow.style.transform = `rotate(${lastArrowRotation}deg)`;
    }
  }

  function onOrientation(event) {
    let heading = null;

    // Safari/iPhone supplies a compass heading directly.
    if (typeof event.webkitCompassHeading === "number") {
      heading = event.webkitCompassHeading;
    } else if (event.absolute === true && typeof event.alpha === "number") {
      // For absolute orientation, alpha rotates counter-clockwise from north.
      heading = 360 - event.alpha;
    } else if (typeof event.alpha === "number") {
      // Fallback for browsers that expose alpha without the absolute flag.
      heading = 360 - event.alpha;
    }

    if (heading !== null && Number.isFinite(heading)) {
      deviceHeading = normaliseDegrees(heading);
      updateNavigation();
    }
  }

  async function requestOrientationAccess() {
    if (!("DeviceOrientationEvent" in window)) {
      return false;
    }

    if (typeof DeviceOrientationEvent.requestPermission === "function") {
      const result = await DeviceOrientationEvent.requestPermission(true);
      if (result !== "granted") {
        throw new Error("Motion and compass permission was not granted.");
      }
    }

    window.addEventListener("deviceorientationabsolute", onOrientation, true);
    window.addEventListener("deviceorientation", onOrientation, true);
    return true;
  }

  function startLocationTracking() {
    if (!navigator.geolocation) {
      throw new Error("This browser does not support location access.");
    }

    watchId = navigator.geolocation.watchPosition(
      position => {
        currentPosition = position;

        const speed = position.coords.speed;
        const heading = position.coords.heading;
        if (
          typeof heading === "number" &&
          Number.isFinite(heading) &&
          (typeof speed !== "number" || speed === null || speed > 0.5)
        ) {
          gpsHeading = normaliseDegrees(heading);
        }

        updateNavigation();
      },
      error => {
        const messages = {
          1: "Location permission was denied. Enable location access for this website and try again.",
          2: "Your position is currently unavailable. Move outdoors and try again.",
          3: "Location timed out. Please try again."
        };
        setStatus(messages[error.code] || "Unable to read your location.", "error");
        startButton.disabled = false;
        startButton.textContent = "Try again";
      },
      {
        enableHighAccuracy: true,
        maximumAge: 1000,
        timeout: 15000
      }
    );
  }

  async function startNavigation() {
    if (!validCoordinates) {
      setStatus("This navigation link contains missing or invalid coordinates.", "error");
      return;
    }

    startButton.disabled = true;
    startButton.textContent = "Starting…";
    setStatus("Requesting location and compass access…");

    try {
      // Must run inside this button event for iPhone permission handling.
      try {
        await requestOrientationAccess();
      } catch (orientationError) {
        console.warn(orientationError);
        setStatus("Location is active, but compass access was not granted. Direction may update only while you are moving.");
      }

      startLocationTracking();
      startButton.textContent = "Navigation active";
    } catch (error) {
      console.error(error);
      setStatus(error.message || "Navigation could not be started.", "error");
      startButton.disabled = false;
      startButton.textContent = "Try again";
    }
  }

  startButton.addEventListener("click", startNavigation);

  if (!validCoordinates) {
    startButton.disabled = true;
    distanceLabel.textContent = "Invalid link";
    setStatus("The destination latitude or longitude is missing or invalid.", "error");
  }

  window.addEventListener("pagehide", () => {
    if (watchId !== null) navigator.geolocation.clearWatch(watchId);
  });
})();
</script>
</body>
</html>
